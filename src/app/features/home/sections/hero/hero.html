<section id="hero" class="first-section-padding bg-surface-light border-b border-border-light">
  <div class="container-padding">
    <!-- Content -->
    <div class="max-w-lg md:max-w-3xl">
      <!-- Title -->
      <h1
        class="text-4xl md:text-6xl min-h-[80px] md:min-h-[120px] font-bold tracking-tight text-text-primary leading-tight animate-fade-up"
      >
        <span i18n="@@home.hero.title.before">Building </span>
        <span class="text-accent inline-block">
          {{ typedText() }}
          <span class="animate-blink text-text-primary">|</span>
        </span>
        <span i18n="@@home.hero.title.after"> digital experiences</span>
      </h1>
      <!-- Subtitle -->
      <p
        i18n="@@home.hero.subtitle"
        class="mt-6 text-lg text-text-secondary animate-fade-up delay-200"
      >
        I create scalable and high-performance web applications.
      </p>

      <!-- Buttons -->
      <div class="mt-8 flex gap-4 animate-fade-up delay-300">
        <a
          i18n="@@home.hero.viewProjectsButton"
          [hreflang]="currentLocale"
          [routerLink]="viewProjectsButtonPath"
          class="px-6 py-3 bg-accent text-text-inverse rounded-lg hover:bg-accent-hover transition font-medium shadow-lg hover:shadow-accent/30"
          >View projects</a
        >

        <a
          i18n="@@home.hero.contactButton"
          [hreflang]="currentLocale"
          [routerLink]="contactButtonPath"
          class="px-6 py-3 bg-surface text-text-secondary border border-border rounded-lg hover:bg-surface-hover transition font-medium shadow-lg hover:shadow-gray-400/30"
          >Contact</a
        >
      </div>
    </div>
  </div>
</section>
