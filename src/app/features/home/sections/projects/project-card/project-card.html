<div
  class="backdrop-blur-sm group bg-surface rounded-2xl overflow-hidden border border-surfaceLight/50 hover:border-accent/40 transition-all duration-300 hover:-translate-y-1 hover:shadow-xl"
>
  <!-- Image -->
  <div class="relative overflow-hidden">
    <img
      [src]="project.image"
      [alt]="project.title"
      loading="lazy"
      class="w-full h-48 object-cover transition-transform duration-500 group-hover:scale-105"
    />

    <!-- Light Overlay -->
    <div class="absolute inset-0 bg-black/10 group-hover:bg-black/20 transition"></div>
  </div>

  <!-- Content -->
  <div class="p-5 flex flex-col gap-4">
    <!-- Title -->
    <h3 class="text-xl font-semibold text-text-primary">
      {{ project.title }}
    </h3>

    <!-- Description -->
    <p class="text-text-secondary text-sm leading-relaxed">
      {{ project.description }}
    </p>

    <!-- Techs -->
    <div class="flex flex-wrap gap-2">
      @for (tech of project.techs; track tech) {
        <span class="text-xs px-2 py-1 rounded-md bg-surfaceLight text-text-secondary">
          {{ tech }}
        </span>
      }
    </div>

    <!-- Actions -->
    <div class="flex items-center gap-4 mt-2">
      @if (project.github) {
        <a
          [href]="project.github"
          target="_blank"
          rel="noopener noreferrer"
          class="text-sm text-text-secondary hover:text-accent transition"
        >
          GitHub
        </a>
      }

      @if (project.demo) {
        <a
          [href]="project.demo"
          target="_blank"
          rel="noopener noreferrer"
          class="text-sm text-accent hover:underline"
        >
          Live Demo
        </a>
      }
    </div>
  </div>
</div>
