<div class="bg-red-500 p-5 flex flex-col gap-4 rounded-lg">
  <h3 class="text-lg font-semibold text-text-primary">
    {{ stack.category }}
  </h3>

  <ul class="flex flex-col gap-3">
    @for (item of stack.stacks; track item.name) {
      <li>
        <div
          class="flex items-center gap-2 px-3 py-2 bg-surfaceLight rounded-lg hover:bg-surface hover:scale-105 transition-all duration-300"
        >
          <img [src]="item.icon" [alt]="item.name" class="w-5 h-5 object-contain" />
          <span class="text-sm text-text-secondary">
            {{ item.name }}
          </span>
        </div>
      </li>
    }
  </ul>
</div>
