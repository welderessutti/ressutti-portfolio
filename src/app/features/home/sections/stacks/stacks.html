<section id="stacks" class="py-20 bg-surface border-b border-border-light">
  <div class="max-w-6xl mx-auto px-4 reveal" appRevealOnScroll>
    <h2 class="text-3xl md:text-4xl font-bold mb-4 text-text-primary">Tecnologias & Ferramentas</h2>

    <p class="text-text-secondary mb-12">
      Tecnologias que utilizo para construir aplicações modernas, performáticas e escaláveis.
    </p>

    <div class="grid sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-8">
      <!-- Category -->
      @for (stack of stacks; track stack.category) {
        <app-stack-card [stack]="stack"></app-stack-card>
      }
    </div>
  </div>
</section>
