<footer class="bg-surface-light border-t border-border">
  <div class="container-padding py-12 lg:py-16">
    <div class="grid md:grid-cols-3 gap-10">
      <!-- Brand -->
      <div>
        <h3 class="text-xl font-bold text-text-primary">Ressutti.dev</h3>
        <p i18n="@@footer.slogan" class="mt-4 text-sm text-text-secondary max-w-xs">
          Building modern, high-performance web applications with a focus on user experience.
        </p>
      </div>

      <!-- Navigation -->
      <div>
        <h4 i18n="@@footer.nav" class="text-sm font-semibold text-text-primary mb-4">Navigation</h4>
        <nav>
          <ul class="flex flex-col gap-2 text-sm text-text-secondary">
            @for (nav of nav.navs; track nav.id) {
              <li>
                <a
                  [hreflang]="nav.locale"
                  [routerLink]="'/' + nav.locale + nav.path"
                  routerLinkActive="text-accent"
                  [routerLinkActiveOptions]="{ exact: true }"
                  class="hover:text-accent transition"
                >
                  {{ nav.label }}
                </a>
              </li>
            }
          </ul>
        </nav>
      </div>

      <!-- Social -->
      <div>
        <h4 i18n="@@footer.contact" class="text-sm font-semibold text-text-primary mb-4">
          Contact
        </h4>
        <nav>
          <ul class="flex flex-col gap-2 text-sm text-text-secondary">
            <li>
              <a
                href="https://github.com/welderessutti"
                target="_blank"
                rel="noopener noreferrer"
                class="hover:text-accent transition"
                >GitHub</a
              >
            </li>
            <li>
              <a
                href="https://linkedin.com/in/welderessutti"
                target="_blank"
                rel="noopener noreferrer"
                class="hover:text-accent transition"
                >LinkedIn</a
              >
            </li>
            <li>
              <a href="mailto:seuemail@email.com" class="hover:text-accent transition"> Email </a>
            </li>
          </ul>
        </nav>
      </div>
    </div>

    <!-- Bottom -->
    <div class="mt-10 pt-6 text-center text-sm text-text-tertiary">
      © 2026 Ressutti.dev. <span i18n="@@footer.copyright">All rights reserved.</span>
    </div>
  </div>
</footer>
